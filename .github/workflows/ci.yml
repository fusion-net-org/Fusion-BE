name: CI

on:
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  push:
    branches: [ main, develop ] 

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_NOLOGO: true
      # Đặt lại 2 biến này cho đúng repo :
      SOLUTION_FILE: Fusion-BE.sln
      WEB_PROJECT: Fusion.API/Fusion.API.csproj
      HEALTH_URL: http://localhost:7160/health

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
          cache: true

      - name: Restore
        run: dotnet restore $SOLUTION_FILE

      - name: Build
        run: dotnet build $SOLUTION_FILE -c Release --no-restore

      - name: Test
        run: dotnet test $SOLUTION_FILE -c Release --no-build --logger "trx;LogFileName=test_results.trx"

      # --- Smoke test: khởi chạy web và ping /health ---
      - name: Publish web
        run: dotnet publish $WEB_PROJECT -c Release -o out

      - name: Run web in background
        run: |
          ASPNETCORE_URLS=http://localhost:7160 dotnet out/*.dll &
          echo $! > web.pid

      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl -fsS "$HEALTH_URL" >/dev/null; then
              echo "Healthy!"; exit 0
            fi
            sleep 2
          done
          echo "Health check failed"; exit 1

      - name: Stop web
        if: always()
        run: |
          if [ -f web.pid ]; then kill $(cat web.pid) || true; fi

      - name: Upload test report (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test_results.trx'
